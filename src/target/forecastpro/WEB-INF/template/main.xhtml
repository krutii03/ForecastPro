<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
<f:view contentType="text/html;charset=UTF-8">
    <f:metadata>
        <ui:insert name="metadata"/>
    </f:metadata>
    <h:head>
        <title><ui:insert name="title">ForecastPro</ui:insert></title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css"/>
        <h:outputStylesheet library="css" name="app.css"/>
    </h:head>
    <h:body styleClass="app-root">
    <p:growl id="growl" showDetail="true" sticky="false"/>
    <div class="layout-topbar">
        <h:link outcome="/app/dashboard.xhtml" styleClass="brand">
            <h:graphicImage library="images" name="logo.png" alt="ForecastPro"
                             styleClass="brand-logo" width="200" height="48"/>
        </h:link>
        <div class="layout-topbar-right">
            <span class="user-label">
                <h:outputText value="#{userSession.currentUser.username}"/>
                (<h:outputText value="#{userSession.currentUser.role}"/>)
            </span>
            <h:form id="topbarLogoutForm" styleClass="topbar-logout-form">
                <p:commandButton id="topLogoutBtn"
                                 value="Sign out"
                                 action="#{userSession.logoutAction}"
                                 ajax="false"
                                 immediate="true"
                                 styleClass="topbar-logout-btn"/>
            </h:form>
        </div>
    </div>
    <div class="layout-wrapper">
        <div class="layout-menu">
            <h:form id="menuForm">
                <p:menu style="width:100%; border:none;">
                    <p:menuitem value="Dashboard" outcome="/app/dashboard.xhtml" icon="pi pi-home"/>
                    <p:menuitem value="Users" outcome="/app/admin/users.xhtml" icon="pi pi-users"
                                rendered="#{userSession.admin}"/>
                    <p:menuitem value="Categories" outcome="/app/admin/categories.xhtml" icon="pi pi-tags"
                                rendered="#{userSession.admin or userSession.employee}"/>
                    <p:menuitem value="Products" outcome="/app/products/products.xhtml" icon="pi pi-box"
                                rendered="#{userSession.admin or userSession.employee}"/>
                    <p:menuitem value="Sales entry" outcome="/app/sales/sales.xhtml" icon="pi pi-shopping-cart"
                                rendered="#{userSession.admin or userSession.employee}"/>
                    <p:menuitem value="Reports" outcome="/app/reports/reports.xhtml" icon="pi pi-chart-bar"
                                rendered="#{userSession.adminOrManager}"/>
                    <p:menuitem value="Messages" outcome="/app/messages/messages.xhtml" icon="pi pi-envelope"/>
                </p:menu>
            </h:form>
        </div>
        <div class="layout-content">
            <ui:insert name="content"/>
        </div>
    </div>
    </h:body>
</f:view>
</html>
