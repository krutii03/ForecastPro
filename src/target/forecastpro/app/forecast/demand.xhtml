<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template/main.xhtml">

    <ui:define name="title">Demand forecast — ForecastPro</ui:define>

    <ui:define name="metadata"/>

    <ui:define name="content">
        <h1 class="page-title">Demand forecast</h1>

        <h:form id="dfForm">
            <p:growl id="dfGrowl" showDetail="true" sticky="false"/>

            <div class="grid-metrics analytics-section" style="margin-bottom:1rem;">
                <div class="metric-card">
                    <div class="metric-label">Forecasted revenue</div>
                    <div class="metric-value">
                        <h:outputText value="#{demandForecastBean.forecastKpis.forecastedRevenue}">
                            <f:convertNumber type="currency" currencySymbol="₹"/>
                        </h:outputText>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Total predicted units</div>
                    <div class="metric-value">
                        <h:outputText value="#{demandForecastBean.forecastKpis.totalPredictedUnits}"/>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Highest predicted product</div>
                    <div class="metric-value metric-value--text">
                        <h:outputText value="#{demandForecastBean.forecastKpis.highestPredictedProduct}"/>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Lowest predicted product</div>
                    <div class="metric-value metric-value--text">
                        <h:outputText value="#{demandForecastBean.forecastKpis.lowestPredictedProduct}"/>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Forecast growth %</div>
                    <div class="metric-value">
                        <h:outputText value="#{demandForecastBean.forecastKpis.forecastGrowthPercent}"/>%
                    </div>
                </div>
            </div>

            <p:panel header="Inputs">
                <p:panelGrid columns="2">
                    <h:outputLabel for="dfc" value="Category"/>
                    <h:selectOneMenu id="dfc" value="#{demandForecastBean.selectedCategoryId}"
                                     styleClass="fp-jsf-select">
                        <f:selectItem itemLabel="— choose —" itemValue="#{null}"/>
                        <f:selectItems value="#{demandForecastBean.categories}" var="c"
                                       itemValue="#{c.id}" itemLabel="#{c.name}"/>
                        <f:ajax listener="#{demandForecastBean.loadProducts}" render="dfpWrap"/>
                    </h:selectOneMenu>

                    <h:outputLabel for="dfp" value="Product"/>
                    <h:panelGroup id="dfpWrap">
                        <h:selectOneMenu id="dfp" value="#{demandForecastBean.selectedProductId}"
                                         styleClass="fp-jsf-select">
                            <f:selectItem itemLabel="— choose —" itemValue="#{null}"/>
                            <f:selectItems value="#{demandForecastBean.products}" var="pr"
                                           itemValue="#{pr.id}" itemLabel="#{pr.name}"/>
                        </h:selectOneMenu>
                    </h:panelGroup>
                </p:panelGrid>
                <div class="fp-forecast-actions">
                    <p:commandButton value="Generate" action="#{demandForecastBean.generate}" ajax="false"
                                     styleClass="ui-button ui-widget ui-corner-all fp-generate-pf"/>
                    <p:commandButton value="Generate all products" action="#{demandForecastBean.generateAll}" ajax="false"
                                     styleClass="ui-button ui-widget ui-corner-all fp-generate-pf"/>
                </div>
            </p:panel>

            <p:outputPanel id="dfResultPanel" layout="block">
                <p:panel header="Latest result (units)" rendered="#{demandForecastBean.lastForecast != null}">
                    <p:panelGrid columns="2" columnClasses="forecast-label-col,forecast-value-col">
                        <h:outputText value="Average recent demand" styleClass="forecast-field-label"/>
                        <h:outputText value="#{demandForecastBean.lastForecast.movingAvgValue}"/>
                        <h:outputText value="Smart prediction" styleClass="forecast-field-label"/>
                        <h:outputText value="#{demandForecastBean.lastForecast.mlRegressionValue}"/>
                        <h:outputText value="Predicted units" styleClass="forecast-field-label"/>
                        <h:outputText value="#{demandForecastBean.lastForecast.predictedSales}"/>
                        <h:outputText value="Confidence range" styleClass="forecast-field-label"/>
                        <h:outputText value="#{demandForecastBean.lastForecast.lowerBound} — #{demandForecastBean.lastForecast.upperBound} units"/>
                        <h:outputText value="Prediction month" styleClass="forecast-field-label"/>
                        <h:outputText value="#{demandForecastBean.lastForecast.forecastMonth}">
                            <f:convertDateTime type="localDate" pattern="MMMM yyyy"/>
                        </h:outputText>
                    </p:panelGrid>
                </p:panel>

                <p:panelGrid columns="2" layout="grid" styleClass="ui-fluid" style="margin-top:1rem;">
                    <p:panel header="Demand Forecast vs Historical Average" styleClass="analytics-chart-panel">
                        <p:lineChart model="#{demandForecastBean.lineModel}"
                                     style="width:100%;height:240px"/>
                    </p:panel>
                    <p:panel header="Product-wise demand" styleClass="analytics-chart-panel">
                        <p:barChart model="#{demandForecastBean.barModel1}"
                                    style="width:100%;height:240px"/>
                    </p:panel>
                </p:panelGrid>

                <p:panel id="dfHistoryPanel" header="Demand forecast history" style="margin-top:1rem;">
                    <h:outputText value="No forecasts yet."
                                  rendered="#{empty demandForecastBean.demandForecastHistoryList}"
                                  style="display:block;padding:0.25rem 0 0.75rem 0;color:#6b7280;"/>

                    <p:dataTable value="#{demandForecastBean.demandForecastHistoryList}" var="f"
                                 paginator="true" rows="10" paginatorPosition="bottom"
                                 emptyMessage="No forecasts yet.">
                        <p:column headerText="Product">
                            <h:outputText value="#{f.product.name}"/>
                        </p:column>
                        <p:column headerText="Recent Average Demand">
                            <h:outputText value="#{f.movingAvgValue}"/>
                        </p:column>
                        <p:column headerText="Smart Demand Prediction">
                            <h:outputText value="#{f.mlRegressionValue}"/>
                        </p:column>
                        <p:column headerText="Estimated Demand (Units)">
                            <h:outputText value="#{f.predictedSales}"/>
                        </p:column>
                        <p:column headerText="Confidence range">
                            <h:outputText value="#{f.lowerBound}"/> — <h:outputText value="#{f.upperBound}"/>
                        </p:column>
                        <p:column headerText="Forecast Month">
                            <h:outputText value="#{f.forecastMonth}">
                                <f:convertDateTime type="localDate" pattern="MMMM yyyy"/>
                            </h:outputText>
                        </p:column>
                    </p:dataTable>
                </p:panel>
            </p:outputPanel>
        </h:form>
    </ui:define>
</ui:composition>
